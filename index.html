<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | GitHub Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- daisyUI and Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts  (geist)-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css style here -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <section
      class="flex flex-col justify-center items-center max-w-[420px] mx-auto mt-10 space-y-6 p-8 rounded-lg bg-base-100 shadow-lg"
    >
      <div class="flex flex-col items-center justify-center text-center">
        <img
          class="w-[100px] h-[100px] mb-6"
          src="./assets/github-logo.png"
          alt="logo icon"
        />
        <h2 class="text-2xl font-semibold">GitHub Issue Tracker</h2>
        <p class="text-base text-[#64748B]">signin to manage your issues</p>
      </div>
      <div>
        <fieldset class="fieldset border-base-300 rounded-box w-xs border p-4">
          <label class="label font-medium text-black">Username</label>
          <input type="text" class="input" placeholder="Enter Username" />
          <p class="text-violet-500 font-medium">Default: admin</p>
          <label class="label font-medium text-black">Password</label>
          <input type="password" class="input" placeholder="Enter Password" />
          <p class="text-violet-500 font-medium">Default: admin123</p>
          <button id="login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>
      <div class="text-center">
        <div class="flex items-center my-2">
  <div class="flex-grow border-t border-gray-300"></div>
  <span class="mx-2 text-gray-700">OR</span>
  <div class="flex-grow border-t border-gray-300"></div>
</div>
        <br />
        <p>Demo Credentials:</p>
        <div class="bg-[#F8FAFC] rounded-lg px-20 py-4 text-left">
          <h2><span class="font-semibold">Username: </span>admin</h2>
          <h2><span class="font-semibold">Password: </span>admin123</h2>
        </div>
      </div>
    </section>
    <!-- javascript -->
    <script src="./script/login.js"></script>
  </body>
</html>
