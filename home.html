<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | GitHub Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- daisyUI and Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts  (geist)-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css style here -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body class="bg-[#F8FAFC]">
    <header>
      <nav
        class="navbar flex flex-col md:flex-row items-center justify-between gap-4 bg-base-100 shadow-sm mx-auto"
      >
        <div class="flex mx-auto md:ml-20">
          <img
            src="./assets/github-logo.png"
            alt="logo icon"
            class="w-10 h-10"
          />
          <a class="btn btn-ghost text-xl">GitHub Issue Tracker</a>
        </div>
        <div class="flex gap-4 mx-auto md:mr-20">
          <label class="input">
            <input id="search-input" type="search" placeholder="Search" />
          </label>
          <button id="new-issue-btn" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </nav>
    </header>

    <main class="mx-auto my-6 md:my-12 md:mx-24 lg:mx-52">
      <!-- Tabs -->
      <section class="flex gap-4 bg-white p-6 rounded-lg shadow-sm mb-4">
        <button id="all-btn" class="btn btn-primary w-28">All</button>
        <button id="open-btn" class="btn btn-soft w-28">Open</button>
        <button id="closed-btn" class="btn btn-soft w-28">Closed</button>
      </section>

      <!-- Issues -->
      <section id="issues-section" class="bg-[#FBFBFB] rounded-lg shadow-lg">
        <div
          class="flex justify-between items-center p-6 bg-white rounded-lg mb-6"
        >
          <div class="flex items-center gap-4">
            <img class="w-10 h-10" src="./assets/Aperture.png" alt="" />
            <div>
              <h2 id="total-issues">0 Issues</h2>
              <p>Track and manage your project issues</p>
            </div>
          </div>
        </div>

        <!-- Spinner -->
        <div class="flex justify-center py-6">
          <div id="spinner" class="hidden">
            <span class="loading loading-spinner text-success"></span>
          </div>
        </div>

        <!-- Containers -->
        <div
          id="all-issue-container"
          class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3"
        ></div>
        <div
          id="open-issue-container"
          class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3"
        ></div>
        <div
          id="closed-issue-container"
          class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3"
        ></div>
      </section>
      <!-- Issue Details Modal -->
      <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl">
          <!-- Title -->
          <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>

          <!-- Status + author + date -->
          <div class="flex items-center gap-2 text-sm text-gray-500 mb-4">
            <span id="modalStatus" class="badge badge-success">Opened</span>
            <span>•</span>
            <span id="modalAuthor"></span>
            <span>•</span>
            <span id="modalDate"></span>
          </div>

          <!-- Labels -->
          <div id="modalLabels" class="flex gap-2 mb-4 flex-wrap"></div>

          <!-- Description -->
          <p id="modalDescription" class="text-gray-600 mb-6"></p>

          <!-- Bottom section -->
          <div class="bg-gray-100 rounded-lg p-4 flex justify-between">
            <div>
              <p class="text-sm text-gray-500">Assignee:</p>
              <p id="modalAssignee" class="font-semibold"></p>
            </div>

            <div>
              <p class="text-sm text-gray-500">Priority:</p>
              <span id="modalPriority" class="badge badge-error"></span>
            </div>
          </div>

          <!-- Close button -->
          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <script src="./script/home.js"></script>
  </body>
</html>
